<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Tourism Explorer India</title>

<style>
body {font-family: Arial, sans-serif; margin:0; background:#f5f5f5;}
header {background:#0077b6; color:white; padding:20px; text-align:center;}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:white;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}
.card:hover {transform:scale(1.03);}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

#detailView {display:none; padding:20px;}

#backBtn {
  background:#0077b6;
  color:white;
  border:none;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
}

#detailImage {
  width:100%;
  max-height:300px;
  object-fit:cover;
  border-radius:10px;
  margin:10px 0;
}

#nearbyContainer {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

#nearbyContainer .card {
  width:200px;
}

.more-btn {
  margin-top:5px;
  background:#0077b6;
  color:white;
  border:none;
  padding:5px;
  border-radius:5px;
  cursor:pointer;
}

.nearby-desc {
  display:none;
  font-size:12px;
  padding:5px;
}

footer {
  background:#0077b6;
  color:white;
  text-align:center;
  padding:15px;
}
</style>
</head>

<body>

<h1>Tourism Explorer India</h1>
</header>

function showDetail(place){
const d=data[place];

document.getElementById("cardsContainer").style.display="none";
document.getElementById("detailView").style.display="block";

document.getElementById("detailTitle").innerText=d.title;
document.getElementById("detailImage").src=d.image;
document.getElementById("detailDescription").innerText=d.description;

let container=document.getElementById("nearbyContainer");
container.innerHTML="";

d.nearby.forEach(p=>{
let item=data[p];

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${item.image}">
<h4>${item.title}</h4>
<button class="more-btn" onclick="this.nextElementSibling.style.display='block'">More Info</button>
<p class="nearby-desc">${item.description}</p>
`;

container.appendChild(card);
});
}

function backToList(){
document.getElementById("detailView").style.display="none";
document.getElementById("cardsContainer").style.display="grid";
}
