<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover India</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* 🔥 Animated gradient overlay + image */
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                  url('/static/images/jaipur.jpg') no-repeat center/cover;
    }

    .container {
      text-align: center;
      color: white;

      /* ✨ animation */
      animation: fadeIn 1.2s ease-in-out;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;

      /* gradient text */
      background: linear-gradient(90deg, #FFD700, #FF8C00);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    button {
      padding: 15px 40px;
      font-size: 1.2rem;
      border: none;
      border-radius: 30px;
      cursor: pointer;

      background: linear-gradient(45deg, #0077b6, #00b4d8);
      color: white;

      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .nav {
      position: absolute;
      top: 20px;
      right: 30px;
    }

    .nav a {
      margin-left: 15px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .nav a:hover {
      color: #FFD700;
    }

  </style>
</head>

<body>

  <!-- 🔹 Top Navigation -->
  <div class="nav">
    <a href="/login">Login</a>
    <a href="/register">Register</a>
  </div>

  <!-- 🔹 Main Content -->
  <div class="container">
    <h1>Discover the Beauty of India 🇮🇳</h1>
    <p>Explore amazing destinations, culture, and heritage</p>

    <!-- ✅ FIXED BUTTON -->
    <button onclick="goToLogin()">Explore Now</button>
  </div>

  <script>
    function goToLogin() {
      window.location.href = "/login";
    }
  </script>

</body>
</html>
